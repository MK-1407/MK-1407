        <text x="0" y="1338" fill="#6FB8C7" font-weight="700" opacity="0">$ connect --list
            <animate attributeName="opacity" from="0" to="1" begin="15.82s" dur="0.3s" fill="freeze" /></text>

        <text x="30" y="1364" opacity="0">
            <tspan fill="#9FEAF9">LinkedIn : </tspan><tspan fill="#5DCAA5">linkedin.stremlo.dev</tspan>
            <animate attributeName="opacity" from="0" to="1" begin="15.94s" dur="0.3s" fill="freeze" /></text>

        <text x="30" y="1390" opacity="0">
            <tspan fill="#9FEAF9">Email    : </tspan><tspan fill="#5DCAA5">hello@stremlo.dev</tspan>
            <animate attributeName="opacity" from="0" to="1" begin="16.06s" dur="0.3s" fill="freeze" /></text>

        <text x="0" y="1442" fill="#9FEAF9" font-weight="700" opacity="0">Thanks for visiting! Happy Coding.

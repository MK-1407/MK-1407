<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="160" viewBox="0 1535 1600 160" preserveAspectRatio="xMidYMid meet">
    <defs>
        <filter id="wideBlur" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="0" result="blur"><animate attributeName="stdDeviation" values="0;0;10;25;45;60" keyTimes="0;0.5;0.65;0.8;0.9;1" dur="1.8s" begin="0s" fill="freeze"/></feGaussianBlur></filter>
        <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        <radialGradient id="haloColor" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#9FEAF9" stop-opacity="0.55"/><stop offset="60%" stop-color="#9FEAF9" stop-opacity="0.15"/><stop offset="100%" stop-color="#9FEAF9" stop-opacity="0"/></radialGradient>
        <radialGradient id="ambientTop" cx="50%" cy="10%" r="70%"><stop offset="0%" stop-color="#1a2a3a" stop-opacity="0.6"/><stop offset="50%" stop-color="#0a1520" stop-opacity="0.2"/><stop offset="100%" stop-color="#0D1117" stop-opacity="0"/></radialGradient>
        <radialGradient id="ambientBottom" cx="50%" cy="90%" r="60%"><stop offset="0%" stop-color="#2a0a30" stop-opacity="0.4"/><stop offset="50%" stop-color="#0a1520" stop-opacity="0.15"/><stop offset="100%" stop-color="#0D1117" stop-opacity="0"/></radialGradient>
        <radialGradient id="vignette" cx="50%" cy="50%" r="75%"><stop offset="50%" stop-color="#000" stop-opacity="0"/><stop offset="100%" stop-color="#000" stop-opacity="0.5"/></radialGradient>
        <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0f2027" stop-opacity="0.9"/><stop offset="50%" stop-color="#2c5364" stop-opacity="0.7"/><stop offset="100%" stop-color="#00d9ff" stop-opacity="0.3"/></linearGradient>
        <linearGradient id="headerGrad2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1a2a3a" stop-opacity="0.5"/><stop offset="100%" stop-color="#9FEAF9" stop-opacity="0.1"/></linearGradient>
        <linearGradient id="footerGrad" x1="0%" y1="100%" x2="100%" y2="0%"><stop offset="0%" stop-color="#00d9ff" stop-opacity="0.3"/><stop offset="50%" stop-color="#2c5364" stop-opacity="0.7"/><stop offset="100%" stop-color="#0f2027" stop-opacity="0.9"/></linearGradient>
        <linearGradient id="subtitleGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9FEAF9"/><stop offset="50%" stop-color="#E879F9"/><stop offset="100%" stop-color="#5DCAA5"/></linearGradient>
        <linearGradient id="sectionHeaderGrad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#9FEAF9"/><stop offset="100%" stop-color="#6FB8C7"/></linearGradient>
        <pattern id="gridDots" width="32" height="32" patternUnits="userSpaceOnUse"><circle cx="16" cy="16" r="0.8" fill="#9FEAF9" fill-opacity="0.04"/></pattern>
        <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse"><line x1="0" y1="0" x2="4" y2="0" stroke="#fff" stroke-opacity="0.012" stroke-width="0.5"/></pattern>
        <clipPath id="clip-subtitle"><rect x="250" y="232" height="32" width="0"><animate attributeName="width" from="0" to="850" begin="2.0s" dur="1.2s" fill="freeze"/></rect></clipPath></defs>
    <rect x="0" y="1535" width="1600" height="160" fill="#0D1117"/>
    <rect x="0" y="1535" width="1600" height="160" fill="url(#ambientTop)"/>
    <rect x="0" y="1535" width="1600" height="160" fill="url(#gridDots)"/>
    <rect x="0" y="1535" width="1600" height="160" fill="url(#scanlines)"/>
    
        <g transform="translate(100, 1535)" font-family="'JetBrains Mono', 'Fira Code', Consolas, monospace" text-rendering="geometricPrecision" opacity="0">
            <animate attributeName="opacity" from="0" to="1" begin="6.0s" dur="0.4s" fill="freeze"/>
            <rect x="0" y="0" width="1400" height="150" rx="10" fill="#0D1117" stroke="#1F2D3D" stroke-width="1.5" shape-rendering="crispEdges"/>
            <rect x="0" y="0" width="1400" height="4" rx="2" fill="#5DCAA5" opacity="0.15" shape-rendering="crispEdges"/>
            <circle cx="18" cy="15" r="5" fill="#FF5F57" opacity="0.8"/>
            <circle cx="36" cy="15" r="5" fill="#FFBD2E" opacity="0.8"/>
            <circle cx="54" cy="15" r="5" fill="#28C840" opacity="0.8"/>
            <text x="700" y="20" text-anchor="middle" fill="#6FB8C7" font-size="13" opacity="0.6">connect.sh</text>
            <line x1="10" y1="28" x2="1390" y2="28" stroke="#1F2D3D" stroke-width="1" opacity="0.5"/>
            <g transform="translate(550, 55)">
                <a href="https://linkedin.stremlo.dev" target="_blank">
                    <image href="connect_files/icons_002_1UzU.svg" x="0" y="0" width="50" height="50"/>
                </a>
                <a href="mailto:hello@stremlo.dev">
                    <image href="connect_files/icons_1UzU.svg" x="80" y="0" width="50" height="50"/>
                </a>
            </g>
            <g transform="translate(400, 120)" opacity="0">
                <animate attributeName="opacity" from="0" to="1" begin="6.8s" dur="0.4s" fill="freeze"/>
                <text x="0" y="0" fill="url(#sectionHeaderGrad)" font-size="14" font-weight="700" filter="url(#softGlow)">Thanks for visiting! Happy Coding.</text>
            </g>
        </g>
</svg>